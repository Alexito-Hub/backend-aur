type User {
  id: ID
  username: String
  email: String
}

type Settings {
  maintenance: Boolean
  logger: String
}

type WebServer {
  url: String
  port: String
  protocol: String
  name: String
  version: String
  description: String
  author: String
  license: String
}

type Collection {
  users: [User]
  webserver: WebServer
  settings: Settings
}

type YouTubeVideo {
  id: String
  url: String
  title: String
  author: String
  description: String
  viewers: String
  verified: Boolean
  duration: String
  thumbnail: String
  avatar: String
  published: String
}

type Query {
  collection: Collection
  searchYouTube(query: String!): [YouTubeVideo]
}