schema: "GraphQL/schema.graphql"

config:
  useIndexSignature: true
  skipTypename: true

generates:
  GraphQL/index.d.ts:
    plugins:
      - typescript
      - typescript-resolvers
    config:
      contextType: "../src/Core/Types/GraphQL#GraphQLContext"

      mappers:
        User:       "../Proto/database#database.IUser"
        Settings:   "../Proto/database#database.ISettings"
        WebServer:  "../Proto/database#database.IWebServer"